<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Import Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .file-button {
            background: #f8f9fa;
            border: 2px dashed #ddd;
            border-radius: 6px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-button:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .file-button.has-file {
            border-color: #28a745;
            background: #f0fff4;
        }
        
        .file-name {
            margin-top: 10px;
            font-weight: 600;
            color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .result h3 {
            margin-bottom: 10px;
        }
        
        .result pre {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 13px;
        }
        
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        
        .info-box h3 {
            color: #1976D2;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .info-box ul {
            margin-left: 20px;
            color: #555;
        }
        
        .info-box li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Recipe Import Tool</h1>
        <p>Upload a JSON file to import recipes into your database</p>
        
        <div class="info-box">
            <h3>ℹ️ JSON Format Required</h3>
            <ul>
                <li>File must be valid JSON</li>
                <li>Must contain a "recipes" array</li>
                <li>Each recipe needs: title, ingredients, instructions</li>
            </ul>
        </div>
        
        <form id="importForm">
            <div class="form-group">
                <label for="apiKey">API Key:</label>
                <input type="text" id="apiKey" value="3989d3f181341f17a5ed6b65c72b2ffc0df6343a4ca586bdea3ef0d149d4c130" required>
            </div>
            
            <div class="form-group">
                <label>Select JSON File:</label>
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".json" required>
                    <div class="file-button" id="fileButton">
                        <div>📄 Click to select JSON file</div>
                        <div class="file-name" id="fileName"></div>
                    </div>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">Import Recipes</button>
        </form>
        
        <div id="result" class="result">
            <h3 id="resultTitle"></h3>
            <div id="resultContent"></div>
        </div>
    </div>
    
    <script>
        const fileInput = document.getElementById('fileInput');
        const fileButton = document.getElementById('fileButton');
        const fileName = document.getElementById('fileName');
        const form = document.getElementById('importForm');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultContent = document.getElementById('resultContent');
        
        // File input handling
        fileButton.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = `Selected: ${file.name}`;
                fileButton.classList.add('has-file');
            }
        });
        
        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert('Please enter API key');
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Importing...';
            
            // Create form data
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                // Upload file
                const response = await fetch(`https://paulstamey.com/momsrecipes/api/import.php?key=${apiKey}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                // Show result
                result.classList.add('show');
                
                if (response.ok) {
                    result.classList.remove('error');
                    result.classList.add('success');
                    resultTitle.textContent = '✅ Import Successful!';
                    resultContent.innerHTML = `
                        <p><strong>Results:</strong></p>
                        <ul>
                            <li>Successfully imported: ${data.results?.success || 0} recipes</li>
                            <li>Failed: ${data.results?.failed || 0} recipes</li>
                            <li>Skipped: ${data.results?.skipped || 0} recipes</li>
                        </ul>
                        ${data.results?.errors?.length > 0 ? '<p><strong>Errors:</strong></p><pre>' + JSON.stringify(data.results.errors, null, 2) + '</pre>' : ''}
                    `;
                } else {
                    result.classList.remove('success');
                    result.classList.add('error');
                    resultTitle.textContent = '❌ Import Failed';
                    resultContent.innerHTML = `
                        <p>${data.error || data.message || 'Unknown error'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.classList.add('show', 'error');
                result.classList.remove('success');
                resultTitle.textContent = '❌ Error';
                resultContent.innerHTML = `<p>${error.message}</p>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Import Recipes';
            }
        });
    </script>
</body>
</html>
